version: '3.8'

# Queen MQ Benchmark Stack
# Resource limits: 4 cores, 8GB RAM total for broker components

services:
  postgres:
    image: postgres:16
    container_name: queen-postgres
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: queen
    ports:
      - "5433:5432"
    volumes:
      - queen_pg_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '3'
          memory: 7G
    command: >
      postgres
      -c shared_buffers=2GB
      -c max_worker_processes=3
      -c effective_cache_size=4GB
      -c maintenance_work_mem=256MB
      -c work_mem=64MB
      -c max_connections=200
      -c synchronous_commit=on
      -c fsync=on
      -c full_page_writes=on
      -c wal_level=replica
      -c max_wal_size=4GB
      -c checkpoint_completion_target=0.9
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - queen-net

  queen:
    image: smartnessai/queen-mq:0.12.13-beta.5
    container_name: queen-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: postgres
      PG_DATABASE: queen
      NUM_WORKERS: 2
      DB_POOL_SIZE: 20
      SIDECAR_POOL_SIZE: 150
      POP_WAIT_BACKOFF_THRESHOLD: 5
      POP_WAIT_BACKOFF_MULTIPLIER: 2
      POP_WAIT_MAX_INTERVAL_MS: 100
      POP_WAIT_INITIAL_INTERVAL_MS: 10
      SIDECAR_MICRO_BATCH_WAIT_MS: 5
    ports:
      - "6632:6632"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    networks:
      - queen-net

volumes:
  queen_pg_data:

networks:
  queen-net:
    driver: bridge
