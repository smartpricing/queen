# Pulsar Standalone Configuration for Benchmark
# Optimized for fair comparison with durability enabled

# Cluster name
clusterName=benchmark-cluster

# Broker settings
brokerServicePort=6650
webServicePort=8080

# Durability settings (fair comparison - sync writes)
managedLedgerDefaultEnsembleSize=1
managedLedgerDefaultWriteQuorum=1
managedLedgerDefaultAckQuorum=1

# Force sync writes for durability (comparable to Kafka acks=all)
journalSyncData=true
ledgerSyncData=true

# Memory settings
managedLedgerCacheSizeMB=1024

# Allow many topics/partitions
maxUnackedMessagesPerConsumer=50000
maxUnackedMessagesPerSubscription=200000

# Performance tuning
numIOThreads=8
numOrderedExecutorThreads=8
numHttpServerThreads=8

# Disable batching on broker side (clients will also disable)
batchingEnabled=false

# Entry cache settings
managedLedgerCacheEvictionWatermark=0.9
managedLedgerCacheEvictionFrequency=100
managedLedgerCacheEvictionTimeThresholdMillis=1000

# BookKeeper settings for standalone
bookkeeperNumberOfChannelsPerBookie=16

# Replication settings (single node)
defaultNumberOfNamespaceBundles=1

# Allow topic auto-creation for benchmark
allowAutoTopicCreation=true
allowAutoTopicCreationType=partitioned
defaultNumPartitions=1
