# Apache Kafka Benchmark Stack (KRaft mode - no ZooKeeper)
# Resource limits: 4 cores, 8GB RAM total for broker

services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka-broker
    environment:
      # KRaft settings
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      
      # Cluster settings
      CLUSTER_ID: 'benchmark-cluster-001'
      
      # Performance tuning for benchmark
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      
      # Durability settings (fair comparison)
      KAFKA_ACKS: all
      KAFKA_MIN_INSYNC_REPLICAS: 1
      
      # Memory settings - allocate more heap for partition metadata
      KAFKA_HEAP_OPTS: "-Xmx6G -Xms6G -XX:+UseG1GC -XX:MaxGCPauseMillis=20 -XX:InitiatingHeapOccupancyPercent=35"
      
      # Log settings
      KAFKA_LOG_RETENTION_HOURS: 1
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      
      # High partition count tuning
      KAFKA_NUM_IO_THREADS: 16
      KAFKA_NUM_NETWORK_THREADS: 8
      KAFKA_NUM_REPLICA_FETCHERS: 4
      KAFKA_BACKGROUND_THREADS: 20
      KAFKA_NUM_RECOVERY_THREADS_PER_DATA_DIR: 4
      
      # Controller tuning for 10k partitions
      KAFKA_CONTROLLER_SOCKET_TIMEOUT_MS: 120000
      KAFKA_REPLICA_LAG_TIME_MAX_MS: 30000
      KAFKA_REPLICA_SOCKET_TIMEOUT_MS: 60000
      KAFKA_REPLICA_SOCKET_RECEIVE_BUFFER_BYTES: 131072
      
      # Metadata cache settings
      KAFKA_METADATA_MAX_RETENTION_MS: 604800000
      KAFKA_METADATA_LOG_SEGMENT_BYTES: 1073741824
      
      # Request handling
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 104857600
      KAFKA_QUEUED_MAX_REQUESTS: 1000
      
      # KRaft controller limits for large partition counts
      KAFKA_METADATA_LOG_MAX_RECORD_BYTES_BETWEEN_SNAPSHOTS: 104857600
      KAFKA_CONTROLLER_QUORUM_APPEND_LINGER_MS: 25
      KAFKA_CONTROLLER_QUORUM_FETCH_TIMEOUT_MS: 10000
      
      # Log flush settings (balance durability vs performance)
      KAFKA_LOG_FLUSH_INTERVAL_MESSAGES: 10000
      KAFKA_LOG_FLUSH_INTERVAL_MS: 1000
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 30s
      retries: 30
      start_period: 60s
    networks:
      - kafka-net

volumes:
  kafka_data:

networks:
  kafka-net:
    driver: bridge
