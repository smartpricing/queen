<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · QueenMQ</title>
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#141415">
    <link rel="icon" type="image/png" href="/queen_logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Cursor palette — mirrors app/src/style.css */
        :root {
            --ink-0: #141415;
            --ink-1: #1a1a1b;
            --ink-2: #1d1d1f;
            --ink-3: #232325;
            --ink-4: #252527;
            --ink-5: #2d2d30;

            --text-hi:   #e6e6e6;
            --text-mid:  #9a9a9a;
            --text-low:  #6a6a6a;
            --text-faint:#464649;

            --accent:    #ffffff;
            --accent-dim:#d4d4d4;

            --bd:    #26262a;
            --bd-hi: #35353a;

            --ember-400: #fb7185;
            --ember-500: #f43f5e;
            --ember-glow: rgba(244, 63, 94, 0.10);

            --ease: cubic-bezier(.2, .7, .2, 1);
            color-scheme: dark;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { height: 100%; }

        body {
            font-family: 'Inter', ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            font-feature-settings: "cv11","ss01","ss03","cv02";
            font-size: 13px;
            letter-spacing: -0.005em;
            -webkit-font-smoothing: antialiased;
            background: var(--ink-0);
            color: var(--text-hi);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 340px;
            padding: 28px 26px 22px;
            border-radius: 8px;
            border: 1px solid var(--bd);
            background: var(--ink-2);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 22px;
        }

        .logo-mark {
            display: inline-block;
            margin-bottom: 14px;
        }
        .logo-mark img {
            display: block;
            height: 72px;
            width: auto;
            max-width: 100%;
            object-fit: contain;
        }

        .logo-section h1 {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.015em;
            line-height: 1.1;
            color: var(--text-hi);
        }
        .logo-section h1 b {
            font-weight: 500;
            font-size: 12px;
            letter-spacing: 0.06em;
            margin-left: 3px;
            color: var(--text-mid);
        }
        .logo-section p {
            color: var(--text-low);
            font-size: 11.5px;
            margin-top: 4px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 10.5px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-low);
        }

        input {
            width: 100%;
            padding: 7px 10px;
            background: var(--ink-3);
            border: 1px solid var(--bd);
            border-radius: 5px;
            font-size: 13px;
            font-family: inherit;
            color: var(--text-hi);
            transition: border-color .12s var(--ease), background .12s var(--ease), box-shadow .12s var(--ease);
            outline: none;
        }
        input::placeholder { color: var(--text-low); }
        input:hover:not(:focus) {
            border-color: var(--bd-hi);
        }
        input:focus {
            border-color: var(--bd-hi);
            background: var(--ink-4);
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.08);
        }

        .btn-submit {
            width: 100%;
            padding: 8px 12px;
            margin-top: 6px;
            background: var(--accent);
            border: 1px solid var(--accent);
            border-radius: 5px;
            font-size: 13px;
            font-family: inherit;
            font-weight: 500;
            color: #000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background .12s var(--ease), border-color .12s var(--ease), color .12s var(--ease);
        }
        .btn-submit:hover {
            background: var(--accent-dim);
            border-color: var(--accent-dim);
        }
        .btn-submit:active { transform: none; }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .divider {
            display: none;
            align-items: center;
            gap: 10px;
            margin: 14px 0 10px;
            color: var(--text-faint);
            font-size: 10.5px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .divider.show { display: flex; }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--bd);
        }

        .btn-google {
            width: 100%;
            padding: 8px 12px;
            background: var(--ink-3);
            border: 1px solid var(--bd);
            border-radius: 5px;
            font-size: 13px;
            font-family: inherit;
            font-weight: 500;
            color: var(--text-hi);
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background .12s var(--ease), border-color .12s var(--ease);
            text-decoration: none;
        }
        .btn-google.show { display: flex; }
        .btn-google:hover {
            background: var(--ink-4);
            border-color: var(--bd-hi);
        }
        .btn-google svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .error {
            background: var(--ember-glow);
            border: 1px solid rgba(244, 63, 94, 0.25);
            color: var(--ember-400);
            padding: 7px 10px;
            border-radius: 4px;
            margin-bottom: 12px;
            font-size: 12px;
            display: none;
            align-items: center;
            gap: 7px;
        }
        .error.show { display: flex; }
        .error-icon {
            flex-shrink: 0;
            color: var(--ember-400);
        }

        .spinner {
            display: none;
            width: 12px;
            height: 12px;
            border: 1.5px solid rgba(0, 0, 0, 0.20);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        .btn-submit.loading .spinner { display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .footer {
            margin-top: 18px;
            text-align: center;
            padding-top: 14px;
            border-top: 1px solid var(--bd);
        }
        .footer p {
            color: var(--text-low);
            font-size: 10.5px;
            font-family: 'JetBrains Mono', ui-monospace, monospace;
            letter-spacing: 0.02em;
        }

        *:focus-visible {
            outline: 1px solid rgba(255, 255, 255, 0.28);
            outline-offset: 1px;
            box-shadow: none;
        }
        ::selection { background: rgba(255, 255, 255, 0.14); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-section">
            <span class="logo-mark">
                <img src="/queen_logo.png" alt="Queen">
            </span>
            <h1>Queen<b>MQ</b></h1>
            <p>Secure proxy access</p>
        </div>

        <div id="error" class="error">
            <svg class="error-icon" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span id="errorText"></span>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input
                    type="text" id="username" name="username"
                    placeholder="Enter your username"
                    required autofocus autocomplete="username"
                >
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password" id="password" name="password"
                    placeholder="Enter your password"
                    required autocomplete="current-password"
                >
            </div>
            <button type="submit" id="loginBtn" class="btn-submit">
                <span id="btnText">Sign in</span>
                <span class="spinner"></span>
            </button>
        </form>

        <div id="oauthDivider" class="divider"><span>or</span></div>

        <a id="googleBtn" class="btn-google" href="/api/auth/google">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.75h3.57c2.08-1.92 3.28-4.74 3.28-8.07z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.75c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.12A6.97 6.97 0 0 1 5.5 12c0-.74.13-1.45.34-2.12V7.04H2.18A11 11 0 0 0 1 12c0 1.78.43 3.46 1.18 4.96l3.66-2.84z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.04l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z"/>
            </svg>
            <span>Sign in with Google</span>
        </a>

        <div class="footer">
            <p>Queen Message Queue</p>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorDiv = document.getElementById('error');
        const errorText = document.getElementById('errorText');
        const loginBtn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        const googleBtn = document.getElementById('googleBtn');
        const oauthDivider = document.getElementById('oauthDivider');

        const OAUTH_ERROR_MESSAGES = {
            invalid_state: 'Sign-in was interrupted. Please try again.',
            not_provisioned: 'This Google account is not authorized for this proxy. Ask an admin to grant access.',
            google_failed: 'Google sign-in failed. Please try again.',
        };

        const params = new URLSearchParams(window.location.search);
        const oauthError = params.get('error');
        if (oauthError) {
            errorText.textContent = OAUTH_ERROR_MESSAGES[oauthError] || `Sign-in error: ${oauthError}`;
            errorDiv.classList.add('show');
            history.replaceState(null, '', window.location.pathname);
        }

        (async () => {
            try {
                const r = await fetch('/api/auth/config', { credentials: 'same-origin' });
                if (!r.ok) return;
                const cfg = await r.json();
                if (cfg && cfg.google && cfg.google.enabled) {
                    googleBtn.classList.add('show');
                    oauthDivider.classList.add('show');
                }
            } catch (_) { /* leave Google button hidden */ }
        })();

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            errorDiv.classList.remove('show');
            loginBtn.disabled = true;
            loginBtn.classList.add('loading');
            btnText.textContent = 'Signing in…';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (response.ok) {
                    btnText.textContent = 'Success';
                    setTimeout(() => { window.location.href = '/'; }, 200);
                } else {
                    throw new Error(data.error || 'Login failed');
                }
            } catch (error) {
                errorText.textContent = error.message || 'Network error. Please try again.';
                errorDiv.classList.add('show');
                loginBtn.disabled = false;
                loginBtn.classList.remove('loading');
                btnText.textContent = 'Sign in';
            }
        });
    </script>
</body>
</html>
